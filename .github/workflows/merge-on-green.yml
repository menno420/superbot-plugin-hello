# merge-on-green — this repo's landing path for agent PRs.
#
# ============================== PROVENANCE ==============================
# Why added : Fleet-wide merge-on-green audit (2026-07-15) found this repo
#             had NO merge mechanism at all — no .github/workflows
#             directory, no native-arm workflow, no REST sweep. The two
#             PRs merged here to date (#1, #2) were both merged by hand
#             by the human owner (confirmed via pull_request_read: no
#             check runs existed on either head SHA). This installs real
#             automation so future PRs land without a manual click.
# Modeled on: menno420/fleet-manager .github/workflows/merge-on-green.yml
#             @ eb7fec06c88366ca0984181184f34f390baa4562 — the REST
#             verify-then-squash-merge sweep shape, chosen over the
#             simpler native-arm enabler because there is no tool
#             available in this task to confirm or toggle this repo's
#             Settings > "Allow auto-merge" switch, so the REST path is
#             the one guaranteed to work regardless of that setting.
# Adapted for this repo:
#   - repository guard -> menno420/superbot-plugin-hello
#   - head-ref prefix  -> claude/* (this repo's only two PRs to date both
#     used claude/* head refs: claude/order-020-kit-pin,
#     claude/fleet-audit-2026-07-13 — same convention as the rest of the
#     fleet)
#   - base branch      -> main (this repo's default branch)
#   - DROPPED the in-progress session-card skip block entirely: this
#     repo has no .sessions/*.md born-red-card convention (no
#     .sessions/ directory exists here at all), so that block does not
#     apply and was removed rather than left in as dead/misleading code.
#   - DROPPED the workflow_run trigger on named CI workflows: this repo
#     currently has NO CI workflows of any kind (confirmed: no
#     .github/workflows directory existed before this PR), so there is
#     no known workflow name to react to yet. check_suite/completed plus
#     the cron backstop still cover the sweep generically; add a
#     workflow_run trigger back once real CI workflow names exist here.
#
# KNOWN LIMITATION (flagged plainly, not silently shipped): this repo has
# no CI configured yet (prior self-audit, PR #1 body: "tests need the
# host `sb` package to import, so nothing here can gate standalone").
# The check-verification step below is copied faithfully from
# fleet-manager: zero check runs on a PR's head SHA counts as "nothing
# verified yet" (NOT ready to merge), not as "nothing to block on, ship
# it." That means, as shipped, this workflow will skip every PR and
# merge nothing until some CI workflow exists here that produces at
# least one check run on PR heads. This is a deliberate, conservative
# choice (a green signal must be an actually-verified signal, never
# assumed) — see this PR's description for the honest trade-off and how
# to flip it if "merge unconditionally, there's nothing to gate on yet"
# is what's actually wanted for a template repo with no tests wired.
#
# Reliability: unverified — confirm its merges against ground truth a
# few times across sessions before trusting it.
# Kill-switch: delete this if it proves unreliable over multiple
# sessions.
# ========================================================================
#
# WHAT IT DOES: on check-suite completion / PR readiness or label
# changes / the half-hourly cron / manual dispatch, sweep ALL open,
# READY (non-draft), same-repo PRs with head `claude/*` and base `main`;
# for each, verify EVERY check run on the head SHA is completed+success
# (pending or missing = NOT ready — skip this round, a later event or
# the next cron re-sweeps); then squash-merge directly with
# GITHUB_TOKEN.
#
# CARVE-OUTS (skipped, never merged/closed/rebased):
#   * labels `do-not-automerge` / `owner-held` (= ratification park),
#     re-read FRESH from the API per PR — event payloads can snapshot
#     labels as of PR open time;
#   * any PR whose diff touches .github/workflows/** — workflow PRs stay
#     OWNER-MERGE-ONLY. This very PR parks itself under its own rail, by
#     design.
#
# RACE GUARD: the merge call pins `--match-head-commit <verified SHA>`,
# so a push racing the sweep can never land an unverified head.
#
# SELF-EXEMPTION (documented, narrow): on pull_request triggers this
# workflow's own job is itself a check run on the head SHA and is
# `in_progress` while it evaluates — requiring it to be completed would
# deadlock every event-triggered sweep. Check runs named exactly
# `merge-on-green` are therefore exempt from the all-green requirement
# (and only those; nothing else is ever exempt).
#
# KNOWN LIMIT (accepted): merges performed with GITHUB_TOKEN do not
# trigger other `push`-event workflows on main (GitHub's recursion
# guard).
name: merge-on-green
on:
  check_suite:
    types: [completed]
  pull_request:
    types: [ready_for_review, synchronize, labeled, unlabeled]
  schedule:
    # Reliable backstop lane: check_suite only fires from this file's
    # copy on main, and GITHUB_TOKEN-created events don't retrigger
    # workflows — the cron catches anything the event lanes miss.
    - cron: "7,37 * * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  checks: read
concurrency:
  # One sweep at a time, repo-wide; queued (never cancelled) so a merge
  # in flight is never killed halfway and a completion event arriving
  # mid-sweep still gets its own follow-up pass.
  group: merge-on-green
  cancel-in-progress: false
jobs:
  merge-on-green:
    if: github.repository == 'menno420/superbot-plugin-hello'
    runs-on: ubuntu-latest
    steps:
      - name: Sweep open claude/* PRs and squash-merge the fully-green ones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys

          repo = os.environ["GITHUB_REPOSITORY"]
          PARK_LABELS = {"do-not-automerge", "owner-held"}
          SELF_CHECK_NAMES = {"merge-on-green"}  # see SELF-EXEMPTION header note

          def gh(*args, ok_fail=False):
              # argv-only (never a shell string): PR-controlled values
              # (branch names, titles) ride as arguments but can never
              # splice into a command.
              r = subprocess.run(["gh", *args], capture_output=True, text=True)
              if r.returncode != 0 and not ok_fail:
                  print(r.stderr, file=sys.stderr)
                  sys.exit(1)  # fail LOUD: an unreadable API must not merge
              return r.returncode, r.stdout, r.stderr

          def parse_lines(out):
              vals = []
              for line in out.splitlines():
                  if not line:
                      continue
                  v = json.loads(line)
                  vals.append(json.loads(v) if isinstance(v, str) else v)
              return vals

          # All open PRs, filtered to the landing lane.
          _, out, _ = gh("api", f"repos/{repo}/pulls?state=open&per_page=100",
                         "--paginate", "--jq", ".[] | @json")
          prs = parse_lines(out)

          merged, skipped = [], []
          for pr in prs:
              n = pr["number"]
              head_ref = pr["head"]["ref"]
              head_sha = pr["head"]["sha"]
              if pr.get("draft"):
                  skipped.append((n, "draft")); continue
              if pr["base"]["ref"] != "main":
                  skipped.append((n, "base != main")); continue
              if (pr["head"]["repo"] or {}).get("full_name") != repo:
                  skipped.append((n, "fork head")); continue
              if not head_ref.startswith("claude/"):
                  skipped.append((n, f"head {head_ref!r} not claude/*")); continue

              # Ratification park — labels re-read FRESH (never trust the
              # event payload).
              _, out, _ = gh("api", f"repos/{repo}/issues/{n}/labels",
                             "--jq", "[.[].name]")
              park = set(json.loads(out or "[]")) & PARK_LABELS
              if park:
                  skipped.append((n, f"ratification park: {sorted(park)}")); continue

              # PR file listing — feeds the workflow-touching-PR rail.
              _, out, _ = gh("api", f"repos/{repo}/pulls/{n}/files?per_page=100",
                             "--paginate", "--jq", ".[] | @json")
              entries = parse_lines(out)
              files = [e["filename"] for e in entries]

              # Owner-merge-only rail: workflow-touching PRs are never
              # merged by a workflow.
              if any(f.startswith(".github/workflows/") for f in files):
                  skipped.append((n, ".github/workflows/** in diff — "
                                     "owner-merge-only")); continue

              # GENERIC check verification: EVERY check run on the head
              # SHA (latest attempt per name, minus the self-exemption)
              # must be completed+success. Zero check runs = nothing
              # verified = NOT ready (see KNOWN LIMITATION in the header
              # — this repo has no CI yet, so this currently means every
              # PR is skipped until some check exists).
              _, out, _ = gh("api",
                             f"repos/{repo}/commits/{head_sha}/check-runs"
                             "?filter=latest&per_page=100", "--paginate",
                             "--jq", '.check_runs[] | {name, status, conclusion} | @json')
              runs = {cr["name"]: cr for cr in parse_lines(out)
                      if cr["name"] not in SELF_CHECK_NAMES}
              if not runs:
                  skipped.append((n, "no check runs on head SHA — "
                                     "nothing verified")); continue
              not_ready = [f"{name}: {cr['status']}/{cr['conclusion']}"
                           for name, cr in sorted(runs.items())
                           if cr["status"] != "completed"
                           or cr["conclusion"] != "success"]
              if not_ready:
                  skipped.append((n, "; ".join(not_ready))); continue

              # Squash-merge, pinned to the SHA just verified so a race
              # push can never land unverified. A failed merge (conflict,
              # base moved) is a warning, not a crash — the next event or
              # cron re-sweeps.
              rc, mout, merr = gh("pr", "merge", str(n), "--repo", repo,
                                  "--squash", "--match-head-commit", head_sha,
                                  "--body", f"Head-ref: {head_ref}",
                                  ok_fail=True)
              if rc == 0:
                  print(f"MERGED PR #{n} ({head_ref} @ {head_sha[:12]})")
                  merged.append(n)
              else:
                  print(f"::warning::merge failed for PR #{n}: {merr.strip()}")
                  skipped.append((n, "merge call failed (see warning)"))

          for n, why in skipped:
              print(f"skipped PR #{n}: {why}")
          print(f"sweep done — merged: {merged or 'none'}")
          PY
